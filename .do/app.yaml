# DigitalOcean App Platform — Sayso
# Two components from one monorepo; App Platform redeploys only the component whose
# files changed on each push (frontend-only push → only `web` rebuilds, etc.).
# Backend + frontend share one domain: web at "/", api at "/api" (prefix stripped, so
# the backend still sees /personas, /ws/converse, /health).
name: sayso
region: sgp

databases:
  - name: sayso-pg
    engine: PG
    production: true
    cluster_name: sayso-pg

services:
  - name: api
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: Pranav322/SaySo
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
    routes:
      - path: /api
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${sayso-pg.DATABASE_URL}
      - key: ALLOWED_ORIGINS
        scope: RUN_TIME
        value: ${APP_URL}
      - key: DASHSCOPE_API_KEY
        scope: RUN_TIME
        type: SECRET

  - name: web
    source_dir: /frontend
    github:
      repo: Pranav322/SaySo
      branch: main
      deploy_on_push: true
    build_command: npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: NEXT_PUBLIC_API_BASE
        scope: BUILD_TIME
        value: /api
